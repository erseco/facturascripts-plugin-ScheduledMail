---
services:
  mariadb:
    image: mariadb:lts
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=facturascripts
      - MYSQL_DATABASE=facturascripts
      - MYSQL_USER=facturascripts
      - MYSQL_PASSWORD=facturascripts
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  facturascripts:
    image: erseco/alpine-facturascripts:main
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database Connection
      DB_HOST: mariadb
      DB_NAME: facturascripts
      DB_USER: facturascripts
      DB_PASSWORD: facturascripts
      # Initial Setup (unattended installation)
      FS_INITIAL_USER: admin
      FS_INITIAL_PASS: admin
      FS_LANG: es_ES
      FS_TIMEZONE: Europe/Madrid
      # Debug mode (set to false in production)
      FS_DEBUG: "true"
      # Enable cron so the work queue runs and scheduled emails are delivered.
      RUN_CRON_TASKS: "true"
    volumes:
      - facturascripts_data:/var/www/html/volume
      # Mount the plugin directory
      - ./:/var/www/html/Plugins/ScheduledMail
    depends_on:
      mariadb:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Local SMTP server to catch sent (and scheduled) emails.
  # Web UI: http://localhost:8025 — SMTP host "mailpit", port 1025 (no auth/encryption).
  # Configure it once in FacturaScripts at Admin > Email (/ConfigEmail).
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  mariadb_data:
  facturascripts_data:
